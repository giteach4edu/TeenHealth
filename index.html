<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" /> <!-- Hiển thị tiếng Việt -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Responsive -->
  <title>TeenHealth Analytics System</title>

  <!-- Font chữ -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

  <style>

    /* Reset CSS mặc định */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif; /* Font chữ */
      background: #dbe8ef; /* Màu nền */
      color: #111; /* Màu chữ */
    }

    /* Khung chính */
    .container {
      max-width: 1150px; /* Giới hạn chiều rộng */
      margin: 0 auto; /* Căn giữa */
      padding: 24px 34px;
    }

    /* HEADER */
    .header {
      display: flex; /* Xếp ngang */
      justify-content: space-between; /* 2 bên */
      align-items: flex-start;
      margin-bottom: 30px;
    }

    /* Logo + chữ */
    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand img {
      width: 66px; /* Size logo */
    }

    .brand-text h1 {
      font-size: 18px;
      font-weight: 800;
    }

    .brand-text p {
      font-size: 14px;
    }

    /* Nút trên */
    .top-buttons {
      display: flex;
      gap: 16px;
    }

    .top-buttons a {
      width: 150px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;

      background: #fff;
      border-radius: 10px;

      text-decoration: none;
      font-weight: 700;

      border: 2px solid #ccc; /* Viền */
      transition: 0.2s;
    }

    .top-buttons a:hover {
      transform: translateY(-2px); /* hover nhô lên */
      border-color: #42a5f5;
    }

    /* TIÊU ĐỀ */
    .hero-title {
      font-size: 48px;
      font-weight: 800;

      width: 100vw; /* Full màn hình */
      margin-left: -34px; /* Kéo ra ngoài */
    }

    /* MAIN */
    .main {
      display: grid;
      grid-template-columns: 400px 1fr; /* trái - phải */
      gap: 30px;
    }

    /* Ảnh bác sĩ */
    .left-side img {
      width: 350px;
    }

    /* BÊN PHẢI */
    .right-side {
      position: relative;
    }

    /* 2 nút lớn */
    .cards-row {
      display: flex;
      justify-content: center;
      gap: 60px;
    }

    .card {
      text-decoration: none;
      color: #111;
      text-align: center;
      transition: 0.2s;
    }

    .card img {
      width: 110px;
      margin-bottom: 10px;
    }

    .card:hover {
      transform: translateY(-5px); /* hover */
    }

    /* Nút trắng */
    .feature-label {
    min-width: 260px;
    padding: 10px 20px;

    white-space: nowrap; /* chữ nằm ngang */

    font-size: 20px;
    border: 2px solid #ccc; /* Viền */
    }

    /* Dưới */
    .bottom-actions {
      position: absolute;
      bottom: 0;
      right: 0;

      display: flex;
      gap: 20px;
    }

    /* Nhóm dấu ? */
    .guide-group {
      display: flex;
      align-items: center;
      gap: 5px; /* Khoảng cách ? và nút */
    }

    .guide-icon {
      font-size: 40px; /* Size dấu ? */
    }

    /* Nút nhỏ */
    .small-btn {
      padding: 10px 20px;

      background: #fff;
      border-radius: 10px;

      text-decoration: none;

      border: 2px solid #ccc; /* Viền */

      transition: 0.2s;
    }

    .small-btn:hover {
      transform: translateY(-2px);
      border-color: #42a5f5;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <img src="logo.png"> <!-- Logo -->
      <div class="brand-text">
        <h1>TEENHEALTH ANALYTICS SYSTEM</h1>
        <p>Hệ thống hỗ trợ phân tích sức khỏe học đường</p>
      </div>
    </div>

    <div class="top-buttons">
      <a href="#">Giới thiệu</a>
      <a href="#">Đăng nhập</a>
    </div>
  </div>

  <!-- TIÊU ĐỀ -->
  <div class="hero-title">
    Hành trình khỏe mạnh – luôn có tụi mình bên bạn!
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- BÊN TRÁI -->
    <div class="left-side">
      <img src="Bacsi.png"> <!-- Ảnh bác sĩ -->
    </div>

    <!-- BÊN PHẢI -->
    <div class="right-side">

      <!-- 2 chức năng -->
      <div class="cards-row">

        <a class="card" href="#">
          <img src="logokiebthuc.png">
          <div class="feature-label">Kiến thức</div>
        </a>

        <a class="card" href="#">
          <img src="logosk.png">
          <div class="feature-label">Phân tích sức khỏe</div>
        </a>

      </div>

      <!-- Nút dưới -->
      <div class="bottom-actions">

        <div class="guide-group">
          <div class="guide-icon">❓</div>
          <a class="small-btn" href="#">Hướng dẫn</a>
        </div>

        <a class="small-btn" href="#">Khảo sát</a>

      </div>

    </div>

  </div>

</div>

</body>
</html>
