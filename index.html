<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeenHealth</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Be Vietnam Pro', sans-serif;
    background:#dbe8ef;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:60px;
}

.menu{
    display:flex;
    gap:30px;
}

.menu button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#eee;
    font-weight:600;
}

/* TITLE */
.title{
    font-size:36px;
    font-weight:800;
    padding:10px 40px;
}

/* MAIN */
.main{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 40px;
}

/* BÁC SĨ */
.doctor img{
    width:300px;
}

/* RIGHT */
.right{
    position:relative;
    width:500px;
    height:300px;
}

/* CARD */
.card{
    position:absolute;
    text-align:center;
}

.card img{
    width:100px;
}

.card button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#eee;
    font-weight:700;
}

/* POSITIONS */
.kienthuc{
    top:0;
    left:50px;
}

.phanTich{
    top:30px;
    right:50px;
}

.bottom{
    position:absolute;
    bottom:0;
    right:0;
    display:flex;
    gap:20px;
}

.bottom button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#eee;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">
        <img src="logo.png">
        <div>
            <b>TEENHEALTH ANALYTICS SYSTEM</b><br>
            Hệ thống hỗ trợ phân tích sức khỏe học đường
        </div>
    </div>

    <div class="menu">
        <button>Giới thiệu</button>
        <button>Đăng nhập</button>
    </div>
</div>

<div class="title">
    Hành trình khỏe mạnh – luôn có tụi mình bên bạn!
</div>

<div class="main">

    <div class="doctor">
        <img src="Bacsi.png">
    </div>

    <div class="right">

        <div class="card kienthuc">
            <img src="https://cdn-icons-png.flaticon.com/512/3976/3976626.png">
            <br>
            <button>Kiến thức</button>
        </div>

        <div class="card phanTich">
            <img src="https://cdn-icons-png.flaticon.com/512/3209/3209265.png">
            <br>
            <button>Phân tích sức khỏe</button>
        </div>

        <div class="bottom">
            <button>Hướng dẫn</button>
            <button>Khảo sát</button>
        </div>

    </div>

</div>

</body>
</html>
